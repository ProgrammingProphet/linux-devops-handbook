# -----------------------------
# HTTP SERVER (port 80)
# -----------------------------
server {
    listen 80;  # Listen for normal HTTP requests
    server_name ilikeyou.in www.ilikeyou.in;  # Your domain names

    # Redirect ALL HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}


# -----------------------------
# HTTPS SERVER (port 443)
# -----------------------------
server {
    listen 443 ssl;  # Listen for HTTPS (secure traffic)

    server_name ilikeyou.in www.ilikeyou.in;  # Domains this config applies to

    # -----------------------------
    # SSL CERTIFICATE FILES
    # -----------------------------
    ssl_certificate /etc/letsencrypt/live/ilikeyou.in/fullchain.pem;  # Public certificate
    ssl_certificate_key /etc/letsencrypt/live/ilikeyou.in/privkey.pem;  # Private key

    # -----------------------------
    # SSL SETTINGS (basic + safe)
    # -----------------------------
    ssl_protocols TLSv1.2 TLSv1.3;  # Only allow modern secure protocols
    ssl_prefer_server_ciphers on;   # Prefer server-defined ciphers

    # -----------------------------
    # ROOT DIRECTORY
    # -----------------------------
    root /usr/share/nginx/html;  # Where your website files live
    index index.html;            # Default file to load

    # -----------------------------
    # HANDLE REQUESTS
    # -----------------------------
    location / {
        try_files $uri $uri/ =404;  # Try file → folder → else 404
    }

    # -----------------------------
    # STATIC FILE CACHING
    # -----------------------------
    location ~* \.(css|js|png|jpg|jpeg|gif|ico)$ {
        expires 7d;  # Cache these files for 7 days
        add_header Cache-Control "public";  # Allow browser caching
    }

    # -----------------------------
    # SECURITY HEADERS
    # -----------------------------
    add_header X-Frame-Options "SAMEORIGIN";  # Prevent clickjacking
    add_header X-Content-Type-Options "nosniff";  # Prevent MIME sniffing
    add_header X-XSS-Protection "1; mode=block";  # Basic XSS protection
}
